services:
  # ==================== AI Agent 服务 ====================
  ai-agent-lite:
    build:
      context: ./ai-agent-lite
      dockerfile: Dockerfile
    container_name: cdut-ai-agent-lite
    ports:
      - "8850:8848"
    volumes:
      - ./.env:/app/.env
      - ./ai-agent-lite/app:/app/app
      - ./data/submissions:/app/data/submissions
      - ./data/training:/app/data/training
      - ./data/chat_history:/app/data/chat_history
      - ./data/problems:/app/data/problems
      - ./data/test_cases:/data/test_cases
    environment:
      - TZ=Asia/Shanghai
      - LITE_LLM_BASE_URL=${UTU_LLM_BASE_URL}
      - LITE_LLM_API_KEY=${UTU_LLM_API_KEY}
      - LITE_LLM_MODEL=${UTU_LLM_MODEL}
      - LITE_LLM_TIMEOUT=30
      - LITE_DATABASE_URL=postgresql+asyncpg://onlinejudge:onlinejudge@cdut-oj-postgres:5432/onlinejudge
      - LITE_DB_SCHEMA=ai_agent
      - LITE_CELERY_BROKER=redis://cdut-redis:6379/1
      - LITE_CELERY_BACKEND=redis://cdut-redis:6379/2
      - LITE_JUDGE_SANDBOX_URL=http://cdut-sandbox:8899
    depends_on:
      - cdut-postgres
      - cdut-redis
      - cdut-sandbox
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Celery Worker（problem auditor） ====================
  ai-agent-celery-worker:
    build:
      context: ./ai-agent-lite
      dockerfile: Dockerfile
    container_name: cdut-ai-agent-celery-worker
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "-Q", "audit", "--concurrency=1"]
    volumes:
      - ./ai-agent-lite/app:/app/app
      - ./data/problems:/app/data/problems
      - ./data/test_cases:/data/test_cases
    environment:
      - TZ=Asia/Shanghai
      - LITE_DATABASE_URL=postgresql+asyncpg://onlinejudge:onlinejudge@cdut-oj-postgres:5432/onlinejudge
      - LITE_DB_SCHEMA=ai_agent
      - LITE_CELERY_BROKER=redis://cdut-redis:6379/1
      - LITE_CELERY_BACKEND=redis://cdut-redis:6379/2
      - LITE_AUDIT_LLM_API_KEY=${XIAOMI_API_KEY}
    depends_on:
      - cdut-redis
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Vue AI Chat 前端 ====================
  vue-ai-chat:
    build:
      context: ./frontend-vue-ai-chat
      dockerfile: Dockerfile
    container_name: cdut-vue-ai-chat
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-vue-ai-chat/src:/app/src
      - ./frontend-vue-ai-chat/public:/app/public
      - ./frontend-vue-ai-chat/index.html:/app/index.html
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - ai-agent-lite
    networks:
      - cdut-network

  # ==================== 独立 PostgreSQL ====================
  cdut-postgres:
    image: postgres:15-alpine
    container_name: cdut-postgres
    environment:
      - POSTGRES_DB=cdut_oj
      - POSTGRES_USER=cdut
      - POSTGRES_PASSWORD=cdut_oj_2024
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== 独立 Redis ====================
  cdut-redis:
    image: redis:7-alpine
    container_name: cdut-redis
    command: ["redis-server", "--dir", "/data", "--save", "60 1", "--appendonly", "no", "--stop-writes-on-bgsave-error", "no"]
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Isolate Sandbox（判题沙盒） ====================
  cdut-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: cdut-sandbox
    privileged: true
    ports:
      - "8899:8899"
    restart: unless-stopped
    networks:
      - cdut-network

networks:
  cdut-network:
    driver: bridge
