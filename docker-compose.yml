services:
  # ==================== AI Agent 服务 ====================
  ai-agent-lite:
    build:
      context: ./ai-agent-lite
      dockerfile: Dockerfile
    container_name: cdut-ai-agent-lite
    ports:
      - "8850:8848"
    volumes:
      - ./.env:/app/.env
      - ./ai-agent-lite/app:/app/app  # 热更新源代码
      - ./data/submissions:/app/data/submissions
      - ./data/training:/app/data/training
      - ./data/chat_history:/app/data/chat_history
      - ./data/problems:/app/data/problems
    environment:
      - TZ=Asia/Shanghai
      - OJ_API_URL=http://oj-backend:8000
      - LITE_LLM_BASE_URL=${UTU_LLM_BASE_URL}
      - LITE_LLM_API_KEY=${UTU_LLM_API_KEY}
      - LITE_LLM_MODEL=${UTU_LLM_MODEL}
      - LITE_LLM_TIMEOUT=30
      - LITE_DATABASE_URL=postgresql+asyncpg://onlinejudge:onlinejudge@oj-postgres:5432/onlinejudge
      - LITE_DB_SCHEMA=ai_agent
      - LITE_CELERY_BROKER=redis://oj-redis:6379/1
      - LITE_CELERY_BACKEND=redis://oj-redis:6379/2
      - LITE_OLLAMA_BASE_URL=http://172.17.0.1:11435
      - LITE_OLLAMA_MODEL=gemma4:31b
      - LITE_OLLAMA_TIMEOUT=600
      - OJ_ADMIN_USER=root
      - OJ_ADMIN_PASS=rootroot
    env_file:
      - .env
    depends_on:
      - oj-backend
      - oj-postgres
      - oj-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Celery Worker (problem auditor) ====================
  ai-agent-celery-worker:
    build:
      context: ./ai-agent-lite
      dockerfile: Dockerfile
    container_name: cdut-ai-agent-celery-worker
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "-Q", "audit", "--concurrency=1"]
    volumes:
      - ./ai-agent-lite/app:/app/app
    environment:
      - TZ=Asia/Shanghai
      - LITE_DATABASE_URL=postgresql+asyncpg://onlinejudge:onlinejudge@oj-postgres:5432/onlinejudge
      - LITE_DB_SCHEMA=ai_agent
      - LITE_CELERY_BROKER=redis://oj-redis:6379/1
      - LITE_CELERY_BACKEND=redis://oj-redis:6379/2
      - LITE_OLLAMA_BASE_URL=http://172.17.0.1:11435
      - LITE_OLLAMA_MODEL=gemma4:31b
      - LITE_OLLAMA_TIMEOUT=600
      - OJ_API_URL=http://oj-backend:8000
      - OJ_ADMIN_USER=root
      - OJ_ADMIN_PASS=rootroot
    depends_on:
      - oj-redis
      - oj-backend
      - oj-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Celery Beat (periodic audit scheduler) ====================
  ai-agent-celery-beat:
    build:
      context: ./ai-agent-lite
      dockerfile: Dockerfile
    container_name: cdut-ai-agent-celery-beat
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    volumes:
      - ./ai-agent-lite/app:/app/app
    environment:
      - TZ=Asia/Shanghai
      - LITE_DATABASE_URL=postgresql+asyncpg://onlinejudge:onlinejudge@oj-postgres:5432/onlinejudge
      - LITE_DB_SCHEMA=ai_agent
      - LITE_CELERY_BROKER=redis://oj-redis:6379/1
      - LITE_CELERY_BACKEND=redis://oj-redis:6379/2
      - OJ_API_URL=http://oj-backend:8000
      - OJ_ADMIN_USER=root
      - OJ_ADMIN_PASS=rootroot
    depends_on:
      - oj-redis
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Vue AI Chat 前端 ====================
  vue-ai-chat:
    build:
      context: ./frontend-vue-ai-chat
      dockerfile: Dockerfile
    container_name: cdut-vue-ai-chat
    ports:
      - "5173:5173"
    volumes:
      # 开发热更新：将本地源代码挂载到容器中
      - ./frontend-vue-ai-chat/src:/app/src
      - ./frontend-vue-ai-chat/public:/app/public
      - ./frontend-vue-ai-chat/index.html:/app/index.html
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - ai-agent-lite
    networks:
      - cdut-network

  # ==================== QDUOJ 后端服务 ====================
  oj-backend:
    image: registry.cn-hongkong.aliyuncs.com/oj-image/backend:1.6.1
    container_name: cdut-oj-backend
    ports:
      - "8000:8000"
    volumes:
      - ./qduoj/data/backend:/data
      - ./oj-backend-overrides/judge/dispatcher.py:/app/judge/dispatcher.py:ro
    environment:
      - POSTGRES_DB=onlinejudge
      - POSTGRES_USER=onlinejudge
      - POSTGRES_PASSWORD=onlinejudge
      - JUDGE_SERVER_TOKEN=cdut-super-token-2024
    depends_on:
      - oj-postgres
      - oj-redis
      - oj-judge
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== QDUOJ 判题服务器 ====================
  oj-judge:
    image: registry.cn-hongkong.aliyuncs.com/oj-image/judge:1.6.1
    container_name: cdut-oj-judge
    read_only: true
    cap_drop:
      - SETPCAP
      - MKNOD
      - NET_BIND_SERVICE
      - SYS_CHROOT
      - SETFCAP
      - FSETID
    tmpfs:
      - /tmp
    volumes:
      - ./qduoj/data/backend/test_case:/test_case:ro
      - ./qduoj/data/judge_server/log:/log
      - ./qduoj/data/judge_server/run:/judger
    environment:
      - SERVICE_URL=http://oj-judge:8080
      - BACKEND_URL=http://oj-backend:8000/api/judge_server_heartbeat/
      - TOKEN=cdut-super-token-2024
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== PostgreSQL 数据库 ====================
  oj-postgres:
    image: postgres:10-alpine
    container_name: cdut-oj-postgres
    environment:
      - POSTGRES_DB=onlinejudge
      - POSTGRES_USER=onlinejudge
      - POSTGRES_PASSWORD=onlinejudge
    volumes:
      - ./qduoj/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - cdut-network

  # ==================== Redis 缓存 ====================
  oj-redis:
    image: redis:4.0-alpine
    container_name: cdut-oj-redis
    volumes:
      - ./qduoj/data/redis:/data
    restart: unless-stopped
    networks:
      - cdut-network

networks:
  cdut-network:
    driver: bridge