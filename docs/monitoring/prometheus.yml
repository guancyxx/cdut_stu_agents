global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/ai-agent-lite-alert-rules.yml

scrape_configs:
  - job_name: ai-agent-lite
    metrics_path: /metrics
    static_configs:
      - targets:
          - ai-agent-lite:8848
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: cdut-ai-agent-lite
